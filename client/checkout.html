<!DOCTYPE html>
<html>
<head>

    <title>Checkout</title>
    <meta name="description" content="Best ecommerce website" />
    <meta name="keywords" content="shop,ecommerce" />

</head>

<body>

    <h1>Checkout</h1>

    <form id="checkoutForm">

        <input
            type="text"

            required

            required

    </form>

    <script src="js/checkout.js"></script>
</body>
</html>
