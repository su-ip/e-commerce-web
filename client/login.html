<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="description" content="Best ecommerce website" />
    <meta name="keywords" content="shop,ecommerce" />
</head>
<body>

    <h1>Login</h1>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
        />

        <input
            type="password"
            id="password"
            placeholder="Password"
        />

        <button type="submit">
            Login
        </button>

    </form>

    <script src="js/auth.js"></script>

</body>
</html>
